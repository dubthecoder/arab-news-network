<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
  <title>ME News - Middle East Live Feed</title>
  <style>
    /* Fonts: Playfair Display, Roboto */
    :root {
  --bg: #ECF0E7;
  --surface: #ffffff;
  --surface-2: #f5f5f0;
  --border: #e0e0d8;
  --text: #111111;
  --text-muted: #5D686C;
  --primary: #D85229;
  --header-bg: #ffffff;
  --badge-bg: #f0ede6;
  --badge-border: #ccc;
  --badge-active-bg: rgba(216, 82, 41, 0.1);
}

[data-theme="dark"] {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface-2: #222222;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --text-muted: #888888;
  --primary: #D85229;
  --header-bg: #111111;
  --badge-bg: #1e1e1e;
  --badge-border: #333;
  --badge-active-bg: rgba(216, 82, 41, 0.15);
}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 1.5rem 2rem;
      border-bottom: 2px solid #e94560;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span:first-child { color: #e94560; }
    .logo span:last-child { color: #fff; }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: #aaa;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background: #e94560;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.7); }
      50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(233, 69, 96, 0); }
    }

    .status-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .status-bar::-webkit-scrollbar { display: none; }

    .source-badge {
      padding: 0.35rem 0.85rem;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 20px;
      font-size: 0.75rem;
      white-space: nowrap;
      color: #aaa;
      cursor: pointer;
      transition: all 0.3s;
    }
    .source-badge:hover, .source-badge.active {
      border-color: #e94560;
      color: #e94560;
      background: rgba(233, 69, 96, 0.1);
    }

    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .lang-toggle button {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .lang-toggle button.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .lang-toggle button:hover:not(.active) {
      border-color: #e94560;
      color: #e94560;
    }

    body.arabic {
      direction: rtl;
      font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    }

    body.arabic .news-card:hover {
      transform: translateX(-4px);
    }

    body.arabic .news-card::before {
      left: auto;
      right: 0;
    }

    .feed-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2rem 3rem;
    }

    .loading {
      text-align: center;
      padding: 4rem 0;
      color: #666;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #222;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .news-card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .news-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #e94560;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .news-card:hover {
      border-color: #e94560;
      transform: translateX(4px);
      background: #161625;
    }

    .news-card:hover::before { opacity: 1; }

    .news-card.new-item {
      animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px) scale(0.97);
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        margin-bottom: 0;
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        max-height: 300px;
        padding-top: 1.5rem;
        padding-bottom: 1.5rem;
        margin-bottom: 1rem;
      }
    }

    .news-card.flash {
      animation: flashHighlight 2s ease;
    }

    @keyframes flashHighlight {
      0% { background: rgba(233, 69, 96, 0.15); border-color: #e94560; }
      100% { background: #12121a; border-color: #1e1e2e; }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
      font-size: 0.8rem;
    }

    .card-source {
      color: #e94560;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-time {
      color: #666;
    }

    .card-new-badge {
      background: #e94560;
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.5rem;
      color: #f0f0f0;
    }

    .card-description {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #888;
    }

    .new-articles-banner {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #e94560;
      color: #fff;
      padding: 0.6rem 1.5rem;
      border-radius: 25px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      z-index: 50;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }

    .new-articles-banner.visible {
      transform: translateX(-50%) translateY(0);
    }

    .error-message {
      text-align: center;
      padding: 2rem;
      color: #e94560;
      background: rgba(233, 69, 96, 0.1);
      border-radius: 12px;
      margin: 2rem 0;
    }

    .article-count {
      color: #555;
      font-size: 0.8rem;
      padding: 0.5rem 0;
    }

    @media (max-width: 768px) {
      header { padding: 1rem; }
      .logo { font-size: 1.5rem; }
      .feed-container { padding: 1rem; }
      .news-card { padding: 1rem; }
      .card-title { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo"><span>ME</span><span> News</span></div>
      <div class="lang-toggle">
        <button id="btnEn" class="active" onclick="switchLang('en')">EN</button>
        <button id="btnAr" onclick="switchLang('ar')">عربي</button>
      </div>
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span>LIVE</span>
        <span id="lastUpdate"></span>
      </div>
    </div>
  </header>

  <div class="status-bar" id="sourceFilters">
    <div class="source-badge active" data-source="all">All Sources</div>
  </div>

  <div class="new-articles-banner" id="newBanner" onclick="scrollToTop()">
    New articles available
  </div>

  <div class="feed-container" id="feed">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading Middle East news...</p>
    </div>
  </div>

  <script>
    const feed = document.getElementById('feed');
    const lastUpdateEl = document.getElementById('lastUpdate');
    const newBanner = document.getElementById('newBanner');
    const sourceFilters = document.getElementById('sourceFilters');

    let articles = [];
    let seenLinks = new Set();
    let activeSource = 'all';
    let lastTimestamp = null;
    let pendingNewCount = 0;
    let currentLang = 'en';
    const POLL_INTERVAL = 30000; // 30 seconds
    const sources = new Set();

    async function fetchNews(initial = false) {
      try {
        const params = new URLSearchParams({ lang: currentLang });
        if (lastTimestamp && !initial) params.set('since', lastTimestamp);
        const url = `/api/news?${params}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();

        lastTimestamp = data.timestamp;
        lastUpdateEl.textContent = new Date().toLocaleTimeString();

        const newArticles = data.articles.filter(a => !seenLinks.has(a.link));
        newArticles.forEach(a => {
          seenLinks.add(a.link);
          sources.add(a.source);
        });

        if (initial) {
          articles = data.articles;
          renderFeed();
          buildSourceFilters();
        } else if (newArticles.length > 0) {
          articles = [...newArticles, ...articles];
          buildSourceFilters();

          if (window.scrollY > 200) {
            pendingNewCount += newArticles.length;
            newBanner.textContent = `${pendingNewCount} new article${pendingNewCount > 1 ? 's' : ''} available`;
            newBanner.classList.add('visible');
          } else {
            prependArticles(newArticles);
          }
        }
      } catch (err) {
        console.error('Fetch error:', err);
        if (articles.length === 0) {
          feed.innerHTML = `<div class="error-message">Failed to load news. Retrying...</div>`;
        }
      }
    }

    function renderFeed() {
      const filtered = activeSource === 'all'
        ? articles
        : articles.filter(a => a.source === activeSource);

      if (filtered.length === 0) {
        feed.innerHTML = `<div class="loading"><p>No articles found.</p></div>`;
        return;
      }

      feed.innerHTML = `<div class="article-count">${filtered.length} articles</div>` +
        filtered.map(a => createCardHTML(a, false)).join('');
    }

    function prependArticles(newArticles) {
      const filtered = activeSource === 'all'
        ? newArticles
        : newArticles.filter(a => a.source === activeSource);

      if (filtered.length === 0) return;

      const countEl = feed.querySelector('.article-count');
      const totalFiltered = activeSource === 'all'
        ? articles.length
        : articles.filter(a => a.source === activeSource).length;

      if (countEl) countEl.textContent = `${totalFiltered} articles`;

      filtered.reverse().forEach(article => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = createCardHTML(article, true);
        const card = wrapper.firstElementChild;

        const firstCard = feed.querySelector('.news-card');
        if (firstCard) {
          feed.insertBefore(card, firstCard);
        } else {
          feed.appendChild(card);
        }

        // Flash effect after slide-in
        setTimeout(() => {
          card.classList.remove('new-item');
          card.classList.add('flash');
        }, 700);
      });
    }

    function createCardHTML(article, isNew) {
      const timeAgo = getTimeAgo(article.pubDate);
      const desc = article.description
        ? article.description.replace(/</g, '&lt;').replace(/>/g, '&gt;')
        : '';
      const title = (article.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const source = (article.source || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      return `
        <a class="news-card ${isNew ? 'new-item' : ''}"
           href="${article.link}" target="_blank" rel="noopener noreferrer">
          <div class="card-meta">
            <span class="card-source">${source}</span>
            <span class="card-time">${timeAgo}</span>
            ${isNew ? '<span class="card-new-badge">New</span>' : ''}
          </div>
          <h2 class="card-title">${title}</h2>
          ${desc ? `<p class="card-description">${desc}</p>` : ''}
        </a>`;
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    function buildSourceFilters() {
      const existing = sourceFilters.querySelectorAll('[data-source]');
      const existingSources = new Set();
      existing.forEach(el => existingSources.add(el.dataset.source));

      sources.forEach(source => {
        if (!existingSources.has(source)) {
          const badge = document.createElement('div');
          badge.className = 'source-badge';
          badge.dataset.source = source;
          badge.textContent = source;
          badge.onclick = () => filterBySource(source);
          sourceFilters.appendChild(badge);
        }
      });
    }

    function filterBySource(source) {
      activeSource = source;
      document.querySelectorAll('.source-badge').forEach(el => {
        el.classList.toggle('active', el.dataset.source === source);
      });
      renderFeed();
    }

    // "All Sources" click handler
    document.querySelector('[data-source="all"]').onclick = () => filterBySource('all');

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      newBanner.classList.remove('visible');

      // After scroll, render the new articles
      setTimeout(() => {
        renderFeed();
        // Flash new items
        const cards = feed.querySelectorAll('.news-card');
        for (let i = 0; i < Math.min(pendingNewCount, cards.length); i++) {
          cards[i].classList.add('flash');
        }
        pendingNewCount = 0;
      }, 400);
    }

    // Hide banner when user scrolls to top
    window.addEventListener('scroll', () => {
      if (window.scrollY < 200 && pendingNewCount > 0) {
        newBanner.classList.remove('visible');
        renderFeed();
        const cards = feed.querySelectorAll('.news-card');
        for (let i = 0; i < Math.min(pendingNewCount, cards.length); i++) {
          cards[i].classList.add('flash');
        }
        pendingNewCount = 0;
      }
    });

    function switchLang(lang) {
      currentLang = lang;
      document.getElementById('btnEn').classList.toggle('active', lang === 'en');
      document.getElementById('btnAr').classList.toggle('active', lang === 'ar');
      document.body.classList.toggle('arabic', lang === 'ar');
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

      // Reset state for fresh fetch
      articles = [];
      seenLinks.clear();
      sources.clear();
      lastTimestamp = null;
      pendingNewCount = 0;
      activeSource = 'all';

      // Reset source filters
      while (sourceFilters.children.length > 0) sourceFilters.removeChild(sourceFilters.firstChild);
      const allBadge = document.createElement('div');
      allBadge.className = 'source-badge active';
      allBadge.dataset.source = 'all';
      allBadge.textContent = lang === 'ar' ? 'جميع المصادر' : 'All Sources';
      allBadge.onclick = () => filterBySource('all');
      sourceFilters.appendChild(allBadge);

      // Show loading
      while (feed.children.length > 0) feed.removeChild(feed.firstChild);
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'loading';
      const spinner = document.createElement('div');
      spinner.className = 'spinner';
      const loadingText = document.createElement('p');
      loadingText.textContent = lang === 'ar' ? 'جاري تحميل الأخبار...' : 'Loading Middle East news...';
      loadingDiv.appendChild(spinner);
      loadingDiv.appendChild(loadingText);
      feed.appendChild(loadingDiv);

      fetchNews(true);
    }

    // Initial load
    fetchNews(true);

    // Poll for new articles
    setInterval(() => fetchNews(false), POLL_INTERVAL);
  </script>
</body>
</html>
