<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
  <title>ME News - Middle East Live Feed</title>
  <style>
    /* Fonts: Playfair Display, Roboto */
    :root {
  --bg: #ECF0E7;
  --surface: #ffffff;
  --surface-2: #f5f5f0;
  --border: #e0e0d8;
  --text: #111111;
  --text-muted: #5D686C;
  --primary: #D85229;
  --header-bg: #ffffff;
  --badge-bg: #f0ede6;
  --badge-border: #ccc;
  --badge-active-bg: rgba(216, 82, 41, 0.1);
}

[data-theme="dark"] {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface-2: #222222;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --text-muted: #888888;
  --primary: #D85229;
  --header-bg: #111111;
  --badge-bg: #1e1e1e;
  --badge-border: #333;
  --badge-active-bg: rgba(216, 82, 41, 0.15);
}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    header {
      background: var(--header-bg);
      padding: 0.75rem 2rem;
      border-bottom: 3px solid var(--primary);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo .accent { color: var(--primary); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(216,82,41,0.6); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(216,82,41,0); }
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 34px;
      height: 34px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { border-color: var(--primary); color: var(--primary); }

    .lang-toggle { display: flex; align-items: center; gap: 0.35rem; }
    .lang-toggle button {
      background: transparent;
      border: 1px solid var(--badge-border);
      color: var(--text-muted);
      padding: 0.3rem 0.65rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .lang-toggle button.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .lang-toggle button:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    body.arabic { direction: rtl; font-family: 'Roboto','Tahoma','Arial',sans-serif; }
    body.arabic .news-card:hover { transform: translateX(-3px); }
    body.arabic .news-card::before { left: auto; right: 0; }

    .status-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.6rem 2rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .status-bar::-webkit-scrollbar { display: none; }

    .source-badge {
      padding: 0.3rem 0.8rem;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .source-badge:hover, .source-badge.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--badge-active-bg);
    }

    .page-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .page-wrapper { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text);
      padding: 0.5rem 0 0.5rem 0.75rem;
      border-left: 4px solid var(--primary);
      margin-bottom: 1rem;
    }

    .article-count {
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0 0 0.75rem;
    }

    .loading { text-align: center; padding: 4rem 0; color: var(--text-muted); }
    .loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 1px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    .news-card:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 12px rgba(216,82,41,0.1);
      transform: translateX(3px);
      z-index: 1;
    }
    .news-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .news-card:hover::before { opacity: 1; }

    .card-body { padding: 0.9rem 1.1rem; flex: 1; }

    .card-image {
      width: 115px;
      min-height: 80px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
      font-size: 0.72rem;
    }
    .card-source { color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-time { color: var(--text-muted); }
    .card-new-badge {
      background: var(--primary);
      color: #fff;
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.35rem;
      color: var(--text);
    }

    .card-description {
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .news-card.new-item { animation: slideIn 0.5s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .news-card.flash { animation: flashHighlight 2s ease; }
    @keyframes flashHighlight {
      0% { background: rgba(216,82,41,0.08); border-color: var(--primary); }
      100% { background: var(--surface); border-color: var(--border); }
    }

    .new-articles-banner {
      position: fixed;
      top: 72px; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--primary);
      color: #fff;
      padding: 0.5rem 1.25rem;
      border-radius: 4px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      z-index: 50;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 4px 16px rgba(216,82,41,0.35);
    }
    .new-articles-banner.visible { transform: translateX(-50%) translateY(0); }

    .error-message {
      text-align: center;
      padding: 2rem;
      color: var(--primary);
      background: rgba(216,82,41,0.08);
      border-radius: 4px;
      border: 1px solid rgba(216,82,41,0.2);
      margin: 1rem 0;
    }

    .sidebar { position: sticky; top: 80px; }
    .sidebar-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .sidebar-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text);
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--primary);
      margin-bottom: 0.75rem;
    }
    .sidebar-item {
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-item:last-child { border-bottom: none; }
    .sidebar-item a {
      color: var(--text);
      text-decoration: none;
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      line-height: 1.35;
      display: block;
    }
    .sidebar-item a:hover { color: var(--primary); }
    .sidebar-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    @media (max-width: 768px) {
      header { padding: 0.75rem 1rem; }
      .logo { font-size: 1.4rem; }
      .page-wrapper { padding: 1rem; gap: 1rem; }
      .card-image { width: 90px; }
      .card-title { font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">ME<span class="accent"> News</span></div>
      <div class="header-controls">
        <div class="live-indicator">
          <div class="live-dot"></div>
          <span>LIVE</span>
          <span id="lastUpdate"></span>
        </div>
        <div class="lang-toggle">
          <button id="btnEn" class="active" onclick="switchLang('en')">EN</button>
          <button id="btnAr" onclick="switchLang('ar')">عربي</button>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
      </div>
    </div>
  </header>

  <div class="status-bar" id="sourceFilters">
    <div class="source-badge active" data-source="all">All Sources</div>
  </div>

  <div class="new-articles-banner" id="newBanner" onclick="scrollToTop()">
    New articles available
  </div>

  <div class="page-wrapper">
    <main>
      <div class="section-heading" id="feedHeading">Latest News</div>
      <div id="feed">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading Middle East news...</p>
        </div>
      </div>
    </main>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Most Recent</div>
        <div id="sidebarList"></div>
      </div>
    </aside>
  </div>

  <script>
    const feed = document.getElementById('feed');
    const lastUpdateEl = document.getElementById('lastUpdate');
    const newBanner = document.getElementById('newBanner');
    const sourceFilters = document.getElementById('sourceFilters');

    let articles = [];
    let seenLinks = new Set();
    let activeSource = 'all';
    let lastTimestamp = null;
    let pendingNewCount = 0;
    let currentLang = 'en';
    const POLL_INTERVAL = 30000; // 30 seconds
    const sources = new Set();

    async function fetchNews(initial = false) {
      try {
        const params = new URLSearchParams({ lang: currentLang });
        if (lastTimestamp && !initial) params.set('since', lastTimestamp);
        const url = `/api/news?${params}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();

        lastTimestamp = data.timestamp;
        lastUpdateEl.textContent = new Date().toLocaleTimeString();

        const newArticles = data.articles.filter(a => !seenLinks.has(a.link));
        newArticles.forEach(a => {
          seenLinks.add(a.link);
          sources.add(a.source);
        });

        if (initial) {
          articles = data.articles;
          renderFeed();
          buildSourceFilters();
        } else if (newArticles.length > 0) {
          articles = [...newArticles, ...articles];
          buildSourceFilters();

          if (window.scrollY > 200) {
            pendingNewCount += newArticles.length;
            newBanner.textContent = `${pendingNewCount} new article${pendingNewCount > 1 ? 's' : ''} available`;
            newBanner.classList.add('visible');
          } else {
            prependArticles(newArticles);
          }
        }
      } catch (err) {
        console.error('Fetch error:', err);
        if (articles.length === 0) {
          feed.innerHTML = `<div class="error-message">Failed to load news. Retrying...</div>`;
        }
      }
    }

    function renderFeed() {
      const filtered = activeSource === 'all'
        ? articles
        : articles.filter(a => a.source === activeSource);

      if (filtered.length === 0) {
        feed.innerHTML = `<div class="loading"><p>No articles found.</p></div>`;
        return;
      }

      feed.innerHTML = `<div class="article-count">${filtered.length} articles</div>` +
        filtered.map(a => createCardHTML(a, false)).join('');
    }

    function prependArticles(newArticles) {
      const filtered = activeSource === 'all'
        ? newArticles
        : newArticles.filter(a => a.source === activeSource);

      if (filtered.length === 0) return;

      const countEl = feed.querySelector('.article-count');
      const totalFiltered = activeSource === 'all'
        ? articles.length
        : articles.filter(a => a.source === activeSource).length;

      if (countEl) countEl.textContent = `${totalFiltered} articles`;

      filtered.reverse().forEach(article => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = createCardHTML(article, true);
        const card = wrapper.firstElementChild;

        const firstCard = feed.querySelector('.news-card');
        if (firstCard) {
          feed.insertBefore(card, firstCard);
        } else {
          feed.appendChild(card);
        }

        // Flash effect after slide-in
        setTimeout(() => {
          card.classList.remove('new-item');
          card.classList.add('flash');
        }, 700);
      });
    }

    function createCardHTML(article, isNew) {
      const timeAgo = getTimeAgo(article.pubDate);
      const desc = article.description
        ? article.description.replace(/</g, '&lt;').replace(/>/g, '&gt;')
        : '';
      const title = (article.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const source = (article.source || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      return `
        <a class="news-card ${isNew ? 'new-item' : ''}"
           href="${article.link}" target="_blank" rel="noopener noreferrer">
          <div class="card-meta">
            <span class="card-source">${source}</span>
            <span class="card-time">${timeAgo}</span>
            ${isNew ? '<span class="card-new-badge">New</span>' : ''}
          </div>
          <h2 class="card-title">${title}</h2>
          ${desc ? `<p class="card-description">${desc}</p>` : ''}
        </a>`;
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    function buildSourceFilters() {
      const existing = sourceFilters.querySelectorAll('[data-source]');
      const existingSources = new Set();
      existing.forEach(el => existingSources.add(el.dataset.source));

      sources.forEach(source => {
        if (!existingSources.has(source)) {
          const badge = document.createElement('div');
          badge.className = 'source-badge';
          badge.dataset.source = source;
          badge.textContent = source;
          badge.onclick = () => filterBySource(source);
          sourceFilters.appendChild(badge);
        }
      });
    }

    function filterBySource(source) {
      activeSource = source;
      document.querySelectorAll('.source-badge').forEach(el => {
        el.classList.toggle('active', el.dataset.source === source);
      });
      renderFeed();
    }

    // "All Sources" click handler
    document.querySelector('[data-source="all"]').onclick = () => filterBySource('all');

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      newBanner.classList.remove('visible');

      // After scroll, render the new articles
      setTimeout(() => {
        renderFeed();
        // Flash new items
        const cards = feed.querySelectorAll('.news-card');
        for (let i = 0; i < Math.min(pendingNewCount, cards.length); i++) {
          cards[i].classList.add('flash');
        }
        pendingNewCount = 0;
      }, 400);
    }

    // Hide banner when user scrolls to top
    window.addEventListener('scroll', () => {
      if (window.scrollY < 200 && pendingNewCount > 0) {
        newBanner.classList.remove('visible');
        renderFeed();
        const cards = feed.querySelectorAll('.news-card');
        for (let i = 0; i < Math.min(pendingNewCount, cards.length); i++) {
          cards[i].classList.add('flash');
        }
        pendingNewCount = 0;
      }
    });

    function switchLang(lang) {
      currentLang = lang;
      document.getElementById('btnEn').classList.toggle('active', lang === 'en');
      document.getElementById('btnAr').classList.toggle('active', lang === 'ar');
      document.body.classList.toggle('arabic', lang === 'ar');
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

      // Reset state for fresh fetch
      articles = [];
      seenLinks.clear();
      sources.clear();
      lastTimestamp = null;
      pendingNewCount = 0;
      activeSource = 'all';

      // Reset source filters
      while (sourceFilters.children.length > 0) sourceFilters.removeChild(sourceFilters.firstChild);
      const allBadge = document.createElement('div');
      allBadge.className = 'source-badge active';
      allBadge.dataset.source = 'all';
      allBadge.textContent = lang === 'ar' ? 'جميع المصادر' : 'All Sources';
      allBadge.onclick = () => filterBySource('all');
      sourceFilters.appendChild(allBadge);

      // Show loading
      while (feed.children.length > 0) feed.removeChild(feed.firstChild);
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'loading';
      const spinner = document.createElement('div');
      spinner.className = 'spinner';
      const loadingText = document.createElement('p');
      loadingText.textContent = lang === 'ar' ? 'جاري تحميل الأخبار...' : 'Loading Middle East news...';
      loadingDiv.appendChild(spinner);
      loadingDiv.appendChild(loadingText);
      feed.appendChild(loadingDiv);

      fetchNews(true);
    }

    // Initial load
    fetchNews(true);

    // Poll for new articles
    setInterval(() => fetchNews(false), POLL_INTERVAL);
  </script>
</body>
</html>
