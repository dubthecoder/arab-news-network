  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    var dOpts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById('dateStr').textContent = new Date().toLocaleDateString('ar-EG-u-nu-latn', dOpts);

    var feed = document.getElementById('feed');
    var heroArea = document.getElementById('heroArea');
    var lastUpdateEl = document.getElementById('lastUpdate');
    var sidebar = document.getElementById('sidebar');
    var tickerTrack = document.getElementById('tickerTrack');

    var articles = [];
    var seenLinks = new Set();
    var activeCountry = 'all';
    var COUNTRY_KW = {
      'فلسطين': ['فلسطين','غزة','الضفة','رام الله','القدس','حماس','الجهاد','فتح','نابلس','جنين','خان يونس','رفح'],
      'لبنان': ['لبنان','بيروت','حزب الله','طرابلس','صيدا'],
      'سوريا': ['سوريا','دمشق','حلب','إدلب','الأسد'],
      'العراق': ['العراق','بغداد','أربيل','كردستان','البصرة','الموصل'],
      'مصر': ['مصر','القاهرة','السيسي','الإسكندرية','سيناء'],
      'السعودية': ['السعودية','الرياض','جدة','مكة','المدينة','ولي العهد','محمد بن سلمان'],
      'الإمارات': ['الإمارات','أبوظبي','دبي','الشارقة'],
      'الأردن': ['الأردن','عمان الأردن','الأردني'],
      'اليمن': ['اليمن','صنعاء','عدن','الحوثي','أنصار الله','مأرب'],
      'ليبيا': ['ليبيا','الليبي','الليبية','بنغازي','حفتر','الدبيبة','مصراتة','سرت','درنة','المنفي'],
      'الكويت': ['الكويت','الكويتي'],
      'قطر': ['قطر','الدوحة','القطري'],
      'البحرين': ['البحرين','المنامة','البحريني']
    };
    function matchesCountry(a, country) {
      if(country==='all') return true;
      var kws=COUNTRY_KW[country]; if(!kws) return false;
      var txt=((a.title||'')+' '+(a.description||'')).toLowerCase();
      for(var i=0;i<kws.length;i++){ if(txt.indexOf(kws[i])!==-1) return true; }
      return false;
    }
    var lastTimestamp = null;
    var POLL_INTERVAL = 1200000; // 20 minutes

    var SECTIONS = [
      { id:'politics', title:'\u0633\u064a\u0627\u0633\u0629 \u0648\u0635\u0631\u0627\u0639\u0627\u062a', kw:['\u0633\u064a\u0627\u0633','\u062d\u0643\u0648\u0645','\u0631\u0626\u064a\u0633','\u0648\u0632\u064a\u0631','\u0628\u0631\u0644\u0645\u0627\u0646','\u0627\u0646\u062a\u062e\u0627\u0628','\u062f\u0628\u0644\u0648\u0645\u0627\u0633','\u0633\u0641\u064a\u0631','\u062d\u0631\u0628','\u0639\u0633\u0643\u0631','\u062c\u064a\u0634','\u0642\u0635\u0641','\u063a\u0627\u0631\u0629','\u0647\u062c\u0648\u0645','\u0635\u0627\u0631\u0648\u062e','\u062f\u0641\u0627\u0639','\u0623\u0645\u0646','\u0625\u0631\u0647\u0627\u0628','\u0627\u062d\u062a\u0644\u0627\u0644','\u0645\u0642\u0627\u0648\u0645','\u0639\u0642\u0648\u0628','\u062d\u0635\u0627\u0631','\u0642\u0645\u0629','\u0645\u0641\u0627\u0648\u0636','\u0627\u062a\u0641\u0627\u0642','\u0633\u0644\u0627\u0645','\u062d\u0632\u0628'] },
      { id:'economy', title:'\u0627\u0642\u062a\u0635\u0627\u062f \u0648\u0623\u0639\u0645\u0627\u0644', kw:['\u0627\u0642\u062a\u0635\u0627\u062f','\u0645\u0627\u0644','\u0628\u0646\u0643','\u0628\u0648\u0631\u0635\u0629','\u0633\u0648\u0642','\u0646\u0641\u0637','\u0623\u0633\u0639\u0627\u0631','\u062a\u062c\u0627\u0631','\u0627\u0633\u062a\u062b\u0645\u0627\u0631','\u0634\u0631\u0643\u0629','\u0623\u0631\u0628\u0627\u062d','\u0639\u0645\u0644\u0629','\u062f\u0648\u0644\u0627\u0631','\u0631\u064a\u0627\u0644','\u062a\u0636\u062e\u0645','\u0645\u064a\u0632\u0627\u0646\u064a','\u0636\u0631\u064a\u0628'] },
      { id:'sports', title:'\u0631\u064a\u0627\u0636\u0629', kw:['\u0631\u064a\u0627\u0636','\u0643\u0631\u0629','\u0644\u0627\u0639\u0628','\u0645\u0628\u0627\u0631\u0627\u0629','\u0628\u0637\u0648\u0644\u0629','\u062f\u0648\u0631\u064a','\u0641\u0631\u064a\u0642','\u0645\u062f\u0631\u0628','\u0647\u062f\u0641','\u0641\u0648\u0632','\u0643\u0623\u0633','\u0645\u0646\u062a\u062e\u0628','\u0646\u0627\u062f\u064a'] },
      { id:'tech', title:'\u062a\u0643\u0646\u0648\u0644\u0648\u062c\u064a\u0627 \u0648\u0639\u0644\u0648\u0645', kw:['\u062a\u0643\u0646\u0648\u0644\u0648\u062c','\u062a\u0642\u0646','\u0630\u0643\u0627\u0621 \u0627\u0635\u0637\u0646\u0627\u0639','\u0631\u0642\u0645','\u0625\u0646\u062a\u0631\u0646\u062a','\u062a\u0637\u0628\u064a\u0642','\u0647\u0627\u062a\u0641','\u0628\u0631\u0645\u062c','\u0628\u064a\u0627\u0646\u0627\u062a','\u0641\u0636\u0627\u0621','\u0646\u0627\u0633\u0627'] },
      { id:'culture', title:'\u062b\u0642\u0627\u0641\u0629 \u0648\u0645\u062c\u062a\u0645\u0639', kw:['\u062b\u0642\u0627\u0641','\u0641\u0646','\u0633\u064a\u0646\u0645\u0627','\u0645\u0633\u0631\u062d','\u0645\u0648\u0633\u064a\u0642','\u0623\u062f\u0628','\u0631\u0648\u0627\u064a','\u0634\u0639\u0631','\u0645\u0639\u0631\u0636','\u0645\u0647\u0631\u062c\u0627\u0646','\u062a\u0631\u0627\u062b','\u062a\u0639\u0644\u064a\u0645','\u062c\u0627\u0645\u0639','\u0635\u062d\u0629','\u0645\u0633\u062a\u0634\u0641','\u0637\u0628','\u0648\u0641\u0627\u0629','\u0648\u0641\u064a'] },
    ];

    function categorize(list) {
      var buckets = {}; SECTIONS.forEach(function(s){ buckets[s.id]={title:s.title,items:[]}; });
      buckets._other = {title: '\u0623\u062e\u0628\u0627\u0631 \u0645\u062a\u0646\u0648\u0639\u0629', items:[]};

      list.forEach(function(a){
        var txt = ((a.title||'')+ ' '+(a.description||'')).toLowerCase();
        var found = false;
        for(var i=0;i<SECTIONS.length;i++){
          for(var k=0;k<SECTIONS[i].kw.length;k++){
            if(txt.indexOf(SECTIONS[i].kw[k].toLowerCase())!==-1){ buckets[SECTIONS[i].id].items.push(a); found=true; break; }
          }
          if(found) break;
        }
        if(!found) buckets._other.items.push(a);
      });
      return buckets;
    }

    function fetchNews(initial) {
      var params = new URLSearchParams();
      if (lastTimestamp && !initial) params.set('since', lastTimestamp);
      fetch('/api/news?' + params)
        .then(function(r){ if(!r.ok) throw new Error('err'); return r.json(); })
        .then(function(data){
          lastTimestamp = data.timestamp;
          lastUpdateEl.textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-EG-u-nu-latn', { hour:'2-digit', minute:'2-digit' });
          var nw = data.articles.filter(function(a){ return !seenLinks.has(a.link); });
          nw.forEach(function(a){ seenLinks.add(a.link); });
          if(initial){ articles=data.articles; renderFeed(); buildTicker(); }
          else if(nw.length>0){
            articles=nw.concat(articles); buildTicker();
            updateHeroLive();
            renderFeed();
          }
        })
        .catch(function(e){
          console.error(e);
          if(!articles.length){ feed.textContent=''; var d=document.createElement('div'); d.className='error-message'; d.textContent='\u0641\u0634\u0644 \u062a\u062d\u0645\u064a\u0644 \u0627\u0644\u0623\u062e\u0628\u0627\u0631...'; feed.appendChild(d); }
        });
    }

    function buildTicker() {
      tickerTrack.textContent = '';
      var tickerItems = articles.slice(0, 10);
      // Duplicate for infinite scroll effect
      var allItems = tickerItems.concat(tickerItems);
      allItems.forEach(function(a) {
        var span = document.createElement('a');
        span.className = 'ticker-item';
        span.href = a.link; span.target = '_blank'; span.rel = 'noopener noreferrer';
        span.textContent = a.title || '';
        tickerTrack.appendChild(span);
      });
    }

    function renderFeed() {
      var filtered = articles;
      if(activeCountry!=='all') filtered=filtered.filter(function(a){ return matchesCountry(a, activeCountry); });
      heroArea.textContent=''; feed.textContent=''; sidebar.textContent='';
      if(!filtered.length){ var d=document.createElement('div'); d.className='loading'; var p=document.createElement('p'); p.textContent='\u0644\u0627 \u062a\u0648\u062c\u062f \u0645\u0642\u0627\u0644\u0627\u062a.'; d.appendChild(p); feed.appendChild(d); return; }

      // Lead story + sub-stories (prioritize politics/conflict, with source diversity)
      var politicsKw = SECTIONS[0].kw;
      function isPolitical(a) {
        var txt = ((a.title||'')+' '+(a.description||'')).toLowerCase();
        for(var k=0;k<politicsKw.length;k++){ if(txt.indexOf(politicsKw[k].toLowerCase())!==-1) return true; }
        return false;
      }
      // Sort candidates: political+image first, then image-only, then rest — stable within each group by original order
      var candidates = filtered.map(function(a,i){ return {a:a, idx:i, pol:isPolitical(a)}; });
      candidates.sort(function(x,y){
        var xScore = (x.a.image?2:0) + (x.pol?1:0);
        var yScore = (y.a.image?2:0) + (y.pol?1:0);
        if(xScore!==yScore) return yScore-xScore;
        return x.idx-y.idx;
      });

      var lead=null, subStories=[], rest=[];
      var heroSources={};
      for(var i=0;i<candidates.length;i++){
        var a=candidates[i].a, src=a.source||'';
        if(!lead && a.image){ lead=a; heroSources[src]=1; }
        else if(lead && subStories.length<6 && a.image){
          var uniqueCount=Object.keys(heroSources).length;
          if(!heroSources[src] || uniqueCount>=3){ subStories.push(a); heroSources[src]=(heroSources[src]||0)+1; }
          else { rest.push(a); }
        }
        else { rest.push(a); }
      }
      // If we couldn't fill 6 sub-stories with diversity, do a second pass
      if(subStories.length<6){
        var rest2=[];
        for(var i=0;i<rest.length;i++){
          if(subStories.length<6 && rest[i].image){ subStories.push(rest[i]); }
          else { rest2.push(rest[i]); }
        }
        rest=rest2;
      }
      if(!lead){ lead=filtered[0]; rest=filtered.slice(1); subStories=[]; }
      heroArea.appendChild(buildHero(lead, subStories));

      // Sidebar: opinion-style stories (diverse sources)
      var opinionSeed = rest.length ? rest : filtered.slice(1);
      var opinionPicks=[], opSources={};
      for(var i=0;i<opinionSeed.length && opinionPicks.length<10;i++){
        var os=opinionSeed[i].source||'';
        if(!opSources[os] || Object.keys(opSources).length>=4){ opinionPicks.push(opinionSeed[i]); opSources[os]=(opSources[os]||0)+1; }
      }
      buildSidebar(opinionPicks);

      // Sections — exclude hero and sidebar articles to avoid duplicates
      var usedLinks = new Set();
      if(lead) usedLinks.add(lead.link);
      subStories.forEach(function(a){ usedLinks.add(a.link); });
      opinionPicks.forEach(function(a){ usedLinks.add(a.link); });
      var secSource = filtered.filter(function(a){ return !usedLinks.has(a.link); });
      var secs = categorize(secSource);
      var order = SECTIONS.map(function(s){return s.id;});
      order.push('_other');
      order.forEach(function(id){
        var s=secs[id]; if(!s||!s.items.length) return;
        s.items = s.items.slice(0, 20);
        feed.appendChild(buildSection(s.title, s.items));
      });
    }

    function buildHero(a, subs) {
      var wrap=document.createElement('div'); wrap.className='hero-wrap';

      // Main column (2/3)
      var col=document.createElement('div'); col.className='hero-main-col';

      var main=document.createElement('a'); main.className='hero-main';
      main.href=articleUrl(a);
      if(a.image){
        var img=document.createElement('img'); img.src=a.image; img.alt=a.title||'';
        img.onerror=function(){this.style.display='none';};
        main.appendChild(img);
      }
      var content=document.createElement('div'); content.className='hero-content';
      var k=document.createElement('div'); k.className='hero-source'; k.textContent=a.source||''; content.appendChild(k);
      var h=document.createElement('h1'); h.className='hero-headline'; h.textContent=a.title||''; content.appendChild(h);

      var points = extractHeroPoints(a.description);
      if(points.length){
        var ul=document.createElement('ul'); ul.className='hero-points';
        points.forEach(function(point){
          var li=document.createElement('li');
          li.textContent=point;
          ul.appendChild(li);
        });
        content.appendChild(ul);
      } else if(a.description){
        var d=document.createElement('p'); d.className='hero-excerpt'; d.textContent=a.description; content.appendChild(d);
      }

      var m=document.createElement('div');
      var byline = [];
      if(a.source) byline.push('\u0628\u0648\u0627\u0633\u0637\u0629 ' + a.source);
      var absDate = formatStoryDate(a.pubDate);
      if(absDate) byline.push(absDate);
      m.className='hero-meta';
      m.textContent=byline.length ? byline.join(' \u2022 ') : getTimeAgo(a.pubDate);
      content.appendChild(m);
      main.appendChild(content);
      col.appendChild(main);

      if(subs && subs.length>0){
        var subRow=document.createElement('div'); subRow.className='hero-sub';
        subs.forEach(function(s){
          var item=document.createElement('a'); item.className='hero-sub-item';
          item.href=articleUrl(s);
          if(s.image){
            var si=document.createElement('img'); si.className='hero-sub-img'; si.src=s.image; si.alt=s.title||''; si.loading='lazy';
            si.onerror=function(){this.style.display='none';};
            item.appendChild(si);
          }
          var txt=document.createElement('div'); txt.className='hero-sub-text';
          var sk=document.createElement('div'); sk.className='hero-sub-source'; sk.textContent=s.source||''; txt.appendChild(sk);
          var st=document.createElement('div'); st.className='hero-sub-title'; st.textContent=s.title||''; txt.appendChild(st);
          item.appendChild(txt);
          subRow.appendChild(item);
        });
        col.appendChild(subRow);
      }
      wrap.appendChild(col);

      // Live feed column (1/3)
      var live=document.createElement('div'); live.className='hero-live'; live.id='heroLiveFeed';
      var liveHdr=document.createElement('div'); liveHdr.className='hero-live-header';
      liveHdr.textContent='آخر الأخبار';
      live.appendChild(liveHdr);
      var liveList=document.createElement('div'); liveList.className='hero-live-list'; liveList.id='heroLiveList';
      live.appendChild(liveList);
      wrap.appendChild(live);

      populateLiveList(liveList);
      return wrap;
    }

    var liveFeedLinks = new Set();

    function createLiveItem(a, animate) {
      var item=document.createElement('a'); item.className='hero-live-item' + (animate ? ' new-item' : '');
      item.href=articleUrl(a);
      item.dataset.link=a.link;
      var top=document.createElement('div');
      top.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:0.15rem;';
      var src=document.createElement('span'); src.className='hero-live-source'; src.textContent=a.source||'';
      var time=document.createElement('span'); time.className='hero-live-time'; time.textContent=getTimeAgo(a.pubDate);
      top.appendChild(src); top.appendChild(time);
      item.appendChild(top);
      var title=document.createElement('div'); title.className='hero-live-title'; title.textContent=a.title||'';
      item.appendChild(title);
      if(animate){
        item.addEventListener('animationend', function(){ item.classList.remove('new-item'); });
      }
      return item;
    }

    function updateHeroLive() {
      var list=document.getElementById('heroLiveList');
      if(!list) return;
      var items=articles.slice(0, 20);
      // Find new articles not yet in the live feed
      var newItems=[];
      items.forEach(function(a){
        if(!liveFeedLinks.has(a.link)) newItems.push(a);
      });
      // Prepend new items with animation
      for(var i=newItems.length-1;i>=0;i--){
        var el=createLiveItem(newItems[i], true);
        list.insertBefore(el, list.firstChild);
        liveFeedLinks.add(newItems[i].link);
      }
      // Trim excess items from bottom
      while(list.children.length>20){
        var last=list.lastChild;
        if(last.dataset && last.dataset.link) liveFeedLinks.delete(last.dataset.link);
        list.removeChild(last);
      }
    }

    function diversifyList(source, max) {
      var picks=[], srcCount={};
      for(var i=0;i<source.length && picks.length<max;i++){
        var s=source[i].source||'';
        var unique=Object.keys(srcCount).length;
        if(!srcCount[s] || unique>=5){ picks.push(source[i]); srcCount[s]=(srcCount[s]||0)+1; }
      }
      // Second pass if not enough
      if(picks.length<max){
        var pickLinks=new Set(picks.map(function(a){return a.link;}));
        for(var i=0;i<source.length && picks.length<max;i++){
          if(!pickLinks.has(source[i].link)) picks.push(source[i]);
        }
      }
      return picks;
    }

    function populateLiveList(list) {
      while(list.firstChild) list.removeChild(list.firstChild);
      liveFeedLinks.clear();
      var items=diversifyList(articles, 20);
      items.forEach(function(a){
        list.appendChild(createLiveItem(a, false));
        liveFeedLinks.add(a.link);
      });
    }

    function buildSidebar(items) {
      if(!items || !items.length) return;
      var box=document.createElement('div'); box.className='opinion-box';
      var hdr=document.createElement('div'); hdr.className='opinion-title';
      hdr.textContent='آراء';
      box.appendChild(hdr);

      var list=document.createElement('div'); list.className='opinion-list';
      items.forEach(function(a){
        var item=document.createElement('a'); item.className='opinion-item';
        item.href=articleUrl(a);

        var copy=document.createElement('div');
        var author=document.createElement('span'); author.className='opinion-author';
        author.textContent=getOpinionAuthor(a);
        copy.appendChild(author);

        var t=document.createElement('div'); t.className='opinion-headline'; t.textContent=a.title||'';
        copy.appendChild(t);
        item.appendChild(copy);

        item.appendChild(buildOpinionAvatar(a));

        list.appendChild(item);
      });
      box.appendChild(list);
      sidebar.appendChild(box);
    }

    function extractHeroPoints(text) {
      if(!text) return [];
      var normalized = text.replace(/\s+/g, ' ').trim();
      if(!normalized) return [];

      var pieces = normalized.split(/[.!?\u061f]\s+/).map(function(x){ return x.trim(); }).filter(function(x){ return x.length > 20; });
      if(pieces.length < 2){
        pieces = normalized.split(/[\u060c;,]\s*/).map(function(x){ return x.trim(); }).filter(function(x){ return x.length > 20; });
      }
      return pieces.slice(0, 2);
    }

    function formatStoryDate(d) {
      if(!d) return '';
      var date = new Date(d);
      if(isNaN(date.getTime())) return '';
      return date.toLocaleDateString('ar-SA-u-nu-latn', { day:'2-digit', month:'long', year:'numeric' });
    }

    function getOpinionAuthor(a) {
      var name = (a && (a.author || a.source) ? (a.author || a.source) : '').toString().trim();
      return name || 'Arab News Network';
    }

    function buildOpinionAvatar(a) {
      if(a && a.image){
        var img=document.createElement('img');
        img.className='opinion-avatar';
        img.src=a.image;
        img.alt=a.title||'';
        img.loading='lazy';
        img.onerror=function(){ this.replaceWith(buildOpinionAvatarFallback(getOpinionAuthor(a))); };
        return img;
      }
      return buildOpinionAvatarFallback(getOpinionAuthor(a));
    }

    function buildOpinionAvatarFallback(name) {
      var fallback=document.createElement('div');
      fallback.className='opinion-avatar-fallback';
      fallback.textContent=getAuthorInitials(name);
      return fallback;
    }

    function getAuthorInitials(name) {
      var parts = (name || '').split(/\s+/).filter(Boolean);
      if(!parts.length) return 'AN';
      if(parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0].charAt(0) + parts[1].charAt(0)).toUpperCase();
    }

    function buildSection(title, items) {
      var sec=document.createElement('div'); sec.className='section';
      // Header
      var hdr=document.createElement('div'); hdr.className='section-header';
      var accent=document.createElement('div'); accent.className='section-accent';
      var name=document.createElement('div'); name.className='section-title'; name.textContent=title;
      var count=document.createElement('div'); count.className='section-count';
      count.textContent=items.length+' \u0645\u0642\u0627\u0644';
      hdr.appendChild(accent); hdr.appendChild(name); hdr.appendChild(count);
      sec.appendChild(hdr);

      var withImg=items.filter(function(a){return !!a.image;});
      var noImg=items.filter(function(a){return !a.image;});

      // Featured row: big card + stacked horizontal cards
      if(withImg.length>=1){
        var row=document.createElement('div'); row.className='card-feat-row';
        row.appendChild(buildCard(withImg[0],true));
        var side=document.createElement('div');
        var sideItems = withImg.slice(1,4);
        sideItems.forEach(function(a){ side.appendChild(buildCardHz(a)); });
        row.appendChild(side);
        sec.appendChild(row);
      }

      // Remaining image cards in 3-col grid (cap at 6)
      var remainImg = withImg.slice(withImg.length>=1 ? 4 : 0, withImg.length>=1 ? 10 : 6);
      if(remainImg.length>0){
        var grid=document.createElement('div'); grid.className='card-grid-3';
        remainImg.forEach(function(a){ grid.appendChild(buildCard(a,false)); });
        sec.appendChild(grid);
      }

      // Text-only briefs in a clean list card (cap at 8)
      var briefItems = noImg.slice(0, 8);
      if(briefItems.length>0){
        var list=document.createElement('div'); list.className='brief-list';
        briefItems.forEach(function(a){ list.appendChild(buildBriefCard(a)); });
        sec.appendChild(list);
      }

      return sec;
    }

    function buildCard(a, big) {
      var el=document.createElement('a'); el.className='card'+(big?' card-big':'');
      el.href=articleUrl(a);
      if(a.image){
        var wrap=document.createElement('div'); wrap.className='card-img-wrap';
        var img=document.createElement('img'); img.className='card-img'; img.src=a.image; img.alt=a.title||''; img.loading='lazy';
        img.onerror=function(){this.parentElement.style.display='none';};
        wrap.appendChild(img); el.appendChild(wrap);
      }
      var body=document.createElement('div'); body.className='card-body';
      var k=document.createElement('div'); k.className='card-source'; k.textContent=a.source||''; body.appendChild(k);
      var t=document.createElement('h2'); t.className='card-title'; t.textContent=a.title||''; body.appendChild(t);
      if(a.description){ var d=document.createElement('p'); d.className='card-excerpt'; d.textContent=a.description; body.appendChild(d); }
      var m=document.createElement('div'); m.className='card-time'; m.textContent=getTimeAgo(a.pubDate); body.appendChild(m);
      el.appendChild(body);
      return el;
    }

    function buildCardHz(a) {
      var el=document.createElement('a'); el.className='card-hz';
      el.href=articleUrl(a);
      if(a.image){
        var wrap=document.createElement('div'); wrap.className='card-img-wrap';
        var img=document.createElement('img'); img.className='card-img'; img.src=a.image; img.alt=a.title||''; img.loading='lazy';
        img.onerror=function(){this.parentElement.style.display='none';};
        wrap.appendChild(img); el.appendChild(wrap);
      }
      var body=document.createElement('div'); body.className='card-body';
      var k=document.createElement('div'); k.className='card-source'; k.textContent=a.source||''; body.appendChild(k);
      var t=document.createElement('h2'); t.className='card-title'; t.textContent=a.title||''; body.appendChild(t);
      var m=document.createElement('div'); m.className='card-time'; m.textContent=getTimeAgo(a.pubDate); body.appendChild(m);
      el.appendChild(body);
      return el;
    }

    function buildBriefCard(a) {
      var el=document.createElement('a'); el.className='brief';
      el.href=articleUrl(a);
      var k=document.createElement('div'); k.className='brief-source'; k.textContent=a.source||''; el.appendChild(k);
      var t=document.createElement('h2'); t.className='brief-title'; t.textContent=a.title||''; el.appendChild(t);
      if(a.description){ var d=document.createElement('p'); d.className='brief-excerpt'; d.textContent=a.description; el.appendChild(d); }
      var m=document.createElement('div'); m.className='brief-time'; m.textContent=getTimeAgo(a.pubDate); el.appendChild(m);
      return el;
    }

    function articleUrl(a) { return a.id ? '/article/' + a.id : a.link; }

    function getTimeAgo(d) {
      if(!d)return''; var diff=Date.now()-new Date(d).getTime(); var m=Math.floor(diff/60000);
      if(m<1)return'\u0627\u0644\u0622\u0646'; if(m<60)return'\u0645\u0646\u0630 '+m+' \u062f\u0642\u064a\u0642\u0629';
      var h=Math.floor(m/60); if(h<24)return'\u0645\u0646\u0630 '+h+' \u0633\u0627\u0639\u0629';
      return'\u0645\u0646\u0630 '+Math.floor(h/24)+' \u064a\u0648\u0645';
    }

    document.querySelectorAll('#countryFilters .nav-item').forEach(function(el){
      el.onclick=function(){
        activeCountry=el.dataset.country;
        document.querySelectorAll('#countryFilters .nav-item').forEach(function(e){e.classList.toggle('active',e.dataset.country===activeCountry);});
        renderFeed();
      };
    });

    function createSvg(paths, circles, lines) {
      var ns='http://www.w3.org/2000/svg';
      var svg=document.createElementNS(ns,'svg');
      svg.setAttribute('viewBox','0 0 24 24');
      svg.setAttribute('fill','none');
      svg.setAttribute('stroke','currentColor');
      svg.setAttribute('stroke-width','2');
      svg.setAttribute('stroke-linecap','round');
      svg.setAttribute('stroke-linejoin','round');
      (paths||[]).forEach(function(d){ var p=document.createElementNS(ns,'path'); p.setAttribute('d',d); svg.appendChild(p); });
      (circles||[]).forEach(function(c){ var el=document.createElementNS(ns,'circle'); el.setAttribute('cx',c[0]); el.setAttribute('cy',c[1]); el.setAttribute('r',c[2]); svg.appendChild(el); });
      (lines||[]).forEach(function(l){ var el=document.createElementNS(ns,'line'); el.setAttribute('x1',l[0]); el.setAttribute('y1',l[1]); el.setAttribute('x2',l[2]); el.setAttribute('y2',l[3]); svg.appendChild(el); });
      return svg;
    }
    function setThemeIcon(theme){
      var btn=document.getElementById('themeToggle');
      while(btn.firstChild) btn.removeChild(btn.firstChild);
      if(theme==='dark') btn.appendChild(createSvg(null,[[12,12,5]],[[12,1,12,3],[12,21,12,23],[4.22,4.22,5.64,5.64],[18.36,18.36,19.78,19.78],[1,12,3,12],[21,12,23,12],[4.22,19.78,5.64,18.36],[18.36,5.64,19.78,4.22]]));
      else btn.appendChild(createSvg(['M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z']));
    }
    function toggleTheme() {
      var d=document.documentElement.getAttribute('data-theme')==='dark';
      var n=d?'light':'dark';
      document.documentElement.setAttribute('data-theme',n);
      setThemeIcon(n);
      localStorage.setItem('theme',n);
    }
    (function(){
      var s=localStorage.getItem('theme')||'light';
      document.documentElement.setAttribute('data-theme',s);
      setThemeIcon(s);
    })();

    var textSizeLevel = parseInt(localStorage.getItem('textSize') || '0');
    function adjustTextSize(dir) {
      textSizeLevel = Math.max(-2, Math.min(3, textSizeLevel + dir));
      document.documentElement.style.fontSize = (100 + textSizeLevel * 8) + '%';
      localStorage.setItem('textSize', textSizeLevel);
    }
    if(textSizeLevel !== 0) document.documentElement.style.fontSize = (100 + textSizeLevel * 8) + '%';

    fetchNews(true);
    setInterval(function(){fetchNews(false);},POLL_INTERVAL);

    function buildStockHalf(stocks) {
      var half=document.createElement('div'); half.className='stock-ticker-half';
      stocks.forEach(function(s){
        var item=document.createElement('div'); item.className='stock-item';
        var name=document.createElement('span'); name.className='stock-name'; name.textContent=s.name;
        var price=document.createElement('span'); price.className='stock-price'; price.textContent=s.price.toLocaleString('ar-EG-u-nu-latn',{minimumFractionDigits:2,maximumFractionDigits:2});
        var change=document.createElement('span');
        var pct=s.changePercent;
        var dir=pct>0?'up':pct<0?'down':'flat';
        change.className='stock-change '+dir;
        var arrow=pct>0?'▲':pct<0?'▼':'–';
        change.textContent=arrow+' '+Math.abs(pct).toFixed(2)+'%';
        item.appendChild(name); item.appendChild(price); item.appendChild(change);
        half.appendChild(item);
      });
      return half;
    }
    function fetchStocks() {
      fetch('/api/stocks')
        .then(function(r){ return r.json(); })
        .then(function(data){
          var el=document.getElementById('stockTicker');
          if(!el || !data.stocks || !data.stocks.length) return;
          while(el.firstChild) el.removeChild(el.firstChild);
          el.appendChild(buildStockHalf(data.stocks));
          el.appendChild(buildStockHalf(data.stocks));
        })
        .catch(function(e){ console.error('Stock fetch error:',e); });
    }
    fetchStocks();
    setInterval(fetchStocks, 1200000); // 20 minutes
  </script>
